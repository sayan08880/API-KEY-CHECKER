<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>API Key Checker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    font-family: "Segoe UI", Arial, sans-serif;
    background:
        radial-gradient(circle at top left, #143b5c, transparent 35%),
        radial-gradient(circle at bottom right, #3b145c, transparent 35%),
        #080b12;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    width: 430px;
    padding: 35px;
    border-radius: 22px;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(18px);
    box-shadow: 0 25px 80px rgba(0,0,0,0.45);
    border: 1px solid rgba(255,255,255,0.15);
    text-align: center;
}

.logo {
    width: 70px;
    height: 70px;
    margin: auto;
    border-radius: 50%;
    background: linear-gradient(135deg, #00d4ff, #9d4edd);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    box-shadow: 0 0 30px rgba(0,212,255,0.5);
}

h2 {
    margin-top: 20px;
    margin-bottom: 8px;
}

p {
    color: #b7c3d0;
    font-size: 14px;
}

.input-box {
    position: relative;
    margin-top: 25px;
}

input {
    width: 100%;
    padding: 15px 45px 15px 15px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(0,0,0,0.35);
    color: white;
    outline: none;
    font-size: 15px;
}

input:focus {
    border-color: #00d4ff;
    box-shadow: 0 0 15px rgba(0,212,255,0.25);
}

.toggle {
    position: absolute;
    right: 12px;
    top: 13px;
    cursor: pointer;
    color: #aaa;
}

button {
    width: 100%;
    margin-top: 20px;
    padding: 15px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #00d4ff, #7b2ff7);
    color: white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.25s;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(0,212,255,0.3);
}

.result {
    margin-top: 25px;
    padding: 18px;
    border-radius: 14px;
    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(255,255,255,0.12);
}

.result h3 {
    margin: 8px 0;
    font-size: 16px;
}

.good {
    color: #00ff99;
}

.bad {
    color: #ff4d6d;
}

.warn {
    color: #ffc857;
}

.footer {
    margin-top: 20px;
    font-size: 12px;
    color: #8b98a8;
}

@media (max-width: 500px) {
    .card {
        width: 90%;
        padding: 25px;
    }
}
</style>
</head>

<body>

<div class="card">
    <div class="logo">🔐</div>

    <h2>Auto Multi API Key Checker</h2>
    <p>Check OpenAI, Gemini, Groq, Claude, Mistral and more safely.</p>

    <form method="POST">
        <div class="input-box">
            <input id="apiKey" type="password" name="api_key" placeholder="Paste your API key">
            <span class="toggle" onclick="toggleKey()">👁</span>
        </div>

        <button type="submit">Check API Key</button>
    </form>

    {% if result %}
    <div class="result">
        <h3>Provider: {{ result[0] }}</h3>
        <h3>Status: <span class="{{ result[2] }}">{{ result[1] }}</span></h3>
    </div>
    {% endif %}

    <div class="footer">
        Your key is checked server-side. Do not publish this online.
    </div>
</div>

<script>
function toggleKey() {
    const input = document.getElementById("apiKey");
    input.type = input.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
